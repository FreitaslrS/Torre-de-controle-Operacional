[server]
headless = true
port = 8501
maxUploadSize = 200
# Não definir address em produção — Streamlit Cloud vincula automaticamente ao 0.0.0.0

[runner]
# Reruns rápidos ao clicar em widgets (não espera o script inteiro reiniciar)
fastReruns = true

[client]
showSidebarNavigation = false

[theme]
base = "light"
primaryColor = "#009640"
backgroundColor = "#f4f6f4"
secondaryBackgroundColor = "#ffffff"
textColor = "#2B2D42"
font = "sans serif"
